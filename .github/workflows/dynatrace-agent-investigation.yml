name: Dynatrace Agent Investigation

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  investigate:
    if: |
      contains(github.event.issue.title, 'Defect Found') ||
      contains(join(github.event.issue.labels.*.name, ','), 'dynatrace-problem')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/joshdynatrace/dtctl-agent:latest

    env:
      PYTHONUNBUFFERED: "1"
      DT_ENV_LIVE: ${{ secrets.DT_ENV_LIVE }}
      DT_PLATFORM_TOKEN: ${{ secrets.DT_PLATFORM_TOKEN }}
      DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
      DTCTL_CONTEXT: demo
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      AUTO_PR: "true"
      AGENT_TRACE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure dtctl auth
        run: |
          DT_ENV_APPS="$(printf '%s' "$DT_ENV_LIVE" | sed 's/\.live\./.apps./')"
          dtctl config set-context demo \
            --environment "$DT_ENV_APPS" \
            --token-ref demo-token
          dtctl config set-credentials demo-token \
            --token "$DT_PLATFORM_TOKEN"
          dtctl config use-context demo
          echo "DT_ENV_APPS=$DT_ENV_APPS" >> "$GITHUB_ENV"

      - name: Verify dtctl non-interactive auth
        run: |
          set -eu
          dtctl commands --brief -o json >/dev/null

          # Validate token + scopes with a real data-plane call.
          QUERY_OUT="$(dtctl query -A 'fetch logs | limit 1' 2>&1)" || {
            echo "$QUERY_OUT"
            if echo "$QUERY_OUT" | grep -Eqi "401|unauthorized|forbidden"; then
              echo "dtctl auth check failed: DT_PLATFORM_TOKEN is unauthorized for DQL."
              echo "Use a Dynatrace Platform token for DT_ENV_APPS and include at least storage:logs:read."
            fi
            exit 1
          }

          # Validate Live Debugger read path used by the agent.
          BP_OUT="$(dtctl get breakpoints -A -o json 2>&1)" || {
            echo "$BP_OUT"
            if echo "$BP_OUT" | grep -Eqi "401|unauthorized|forbidden"; then
              echo "Live Debugger auth check failed: token missing debugger/settings scopes."
            fi
            exit 1
          }

      - name: Run orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python agent/orchestrator.py

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-evidence-${{ github.run_id }}
          path: agent/output/
