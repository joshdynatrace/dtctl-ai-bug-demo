name: Dynatrace Agent Investigation

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  investigate:
    if: |
      contains(github.event.issue.title, 'Defect Found') ||
      contains(join(github.event.issue.labels.*.name, ','), 'dynatrace-problem')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONUNBUFFERED: "1"
      DT_ENV_URL: ${{ secrets.DT_ENV_URL }}
      DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
      DTCTL_ENVIRONMENT: ${{ secrets.DT_ENV_URL }}
      DTCTL_TOKEN: ${{ secrets.DT_API_TOKEN }}
      DTCTL_CONTEXT: demo
      DTCTL_USE_AGENT_MODE: "auto"
      CLAUDECODE: "1"
      INVESTIGATION_AGENT: "claudecode"
      CLAUDECODE_INVESTIGATE_CMD: ${{ vars.CLAUDECODE_INVESTIGATE_CMD }}
      AGENT_MODEL: gpt-5.3-codex
      AUTO_PR: "true"
      DRY_RUN: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Install dtctl
        run: |
          curl -fsSL https://raw.githubusercontent.com/dynatrace-oss/dtctl/main/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          dtctl version || true

      - name: Verify dtctl non-interactive auth
        run: |
          dtctl commands --brief -o json

      - name: Validate Claude configuration
        env:
          CLAUDECODE_INVESTIGATE_CMD: ${{ vars.CLAUDECODE_INVESTIGATE_CMD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$CLAUDECODE_INVESTIGATE_CMD" ]; then
            echo "Missing repo variable: CLAUDECODE_INVESTIGATE_CMD"
            exit 1
          fi
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "Missing repo secret: ANTHROPIC_API_KEY"
            exit 1
          fi

      - name: Run orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python agent/orchestrator.py

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-evidence-${{ github.run_id }}
          path: agent/output/
