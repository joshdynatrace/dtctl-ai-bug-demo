site_name: "Arc Store: Agentic Debugging Demo"
repo_name: "View Code on GitHub"
repo_url: "https://github.com/joshdynatrace/dtctl-ai-bug-demo"
nav:
  - '1. About': index.md
  - '2. Getting Started': getting-started.md
  - '3. Codespaces': codespaces.md
  - '4. Phase 1: Detection': phase-1-detection.md
  - '5. Phase 2: Investigation': phase-2-investigation.md
  - '6. Phase 3: Remediation': phase-3-remediation.md
  - '7. Cleanup': cleanup.md
  - '8. Resources': resources.md
  - "9. What's Next?": whats-next.md
theme:
  name: material
  custom_dir: docs/overrides
  features:
    - content.code.copy

  palette:
  # Palette toggle for automatic mode
  - media: "(prefers-color-scheme)"
    toggle:
      icon: material/brightness-auto
      name: Switch to light mode

  # Palette toggle for light mode
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: deep-purple
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode

  # Palette toggle for dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: deep-purple
    toggle:
      icon: material/brightness-4
      name: Switch to system preference

markdown_extensions:
  - toc:
      permalink: '#'
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["docs"]
  - attr_list
plugins:
    - search
extra_css:
  - overrides/assets/stylesheets/extra.css
