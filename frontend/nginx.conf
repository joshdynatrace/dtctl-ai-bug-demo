server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Route API calls from the SPA to the backend service in Kubernetes.
    location /api/ {
        proxy_pass http://arc-backend.arc-store.svc.cluster.local:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml;
    gzip_min_length 1024;
}
